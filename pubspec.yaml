publish_to: 'none'
version: 5.0.0+5

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  intl: ^0.18.1
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
