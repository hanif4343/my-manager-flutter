name: my_manager
description: Personal Project & Idea Manager
publish_to: 'none'
version: 2.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  share_plus: ^7.2.1
  file_picker: ^6.1.1
  intl: ^0.18.1
  flutter_slidable: ^3.0.1
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  cupertino_icons: ^1.0.6
  image_picker: ^1.0.7
  archive: ^3.4.10
  # নতুন প্যাকেজগুলো এখানে যোগ করা হলো
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
