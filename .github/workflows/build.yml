name: Build My Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze || true


      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/my-manager.jks

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Rename APK
        run: |
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk output/MyManager-arm64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk output/MyManager-arm32.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyManager-APK
          path: output/*.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "My Manager v${{ github.run_number }}"
          body: |
            ## 🚀 My Manager APK
            - **MyManager-arm64.apk** → নতুন ফোন (2018+)
            - **MyManager-arm32.apk** → পুরনো ফোন
          files: output/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
