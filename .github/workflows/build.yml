name: Build My Manager APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code (Ignore warnings)
        run: flutter analyze || true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode --ignore-garbage > android/app/my-manager.jks

      - name: Build APK
        run: flutter build apk --release --split-per-abi
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Organize APK Files
        run: |
          mkdir -p output
          # ফাইলগুলো খুঁজে বের করে আউটপুট ফোল্ডারে কপি করা
          find build/app/outputs/flutter-apk/ -name "*arm64-v8a-release.apk" -exec cp {} output/MyManager-arm64.apk \;
          find build/app/outputs/flutter-apk/ -name "*armeabi-v7a-release.apk" -exec cp {} output/MyManager-arm32.apk \;
          # যদি কোনো কারণে স্প্লিট না হয়ে একটি ফাইল তৈরি হয়
          find build/app/outputs/flutter-apk/ -name "app-release.apk" -exec cp {} output/MyManager-Full.apk \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: "My Manager v${{ github.run_number }}"
          body: |
            ## 🚀 My Manager APK Updated
            - **MyManager-arm64.apk** (নতুন ফোনের জন্য)
            - **MyManager-arm32.apk** (পুরানো ফোনের জন্য)
            - **Build Number:** ${{ github.run_number }}
          files: output/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
